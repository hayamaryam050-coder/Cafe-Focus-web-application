<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Focus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Quicksand:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --cream: #F7F1E6;
    --beige: #EAD9C2;
    --beige-deep: #D9C4A3;
    --blue: #7FA1B3;
    --blue-deep: #3F6079;
    --blush: #C98F82;
    --matcha: #8FA888;
    --ink: #453B33;
    --ink-soft: #8A7C6D;
    --paper: #FBF6EC;
    --shadow: rgba(69, 59, 51, 0.18);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background: var(--cream);
    color: var(--ink);
    font-family: 'Quicksand', sans-serif;
  }

  body{
    padding: 28px 16px 60px;
    display:flex;
    justify-content:center;
  }

  .app{
    width:100%;
    max-width: 980px;
  }

  h1,h2,h3{
    font-family:'Fraunces', 'Georgia', serif;
    font-weight:600;
    margin:0;
  }

  /* ---------- Header ---------- */
  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:18px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }

  .brand-mark{
    width:46px;height:46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #fff3, transparent 60%), var(--blue-deep);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    box-shadow: 0 3px 8px var(--shadow);
  }

  .brand h1{ font-size: 26px; letter-spacing:0.3px; }
  .brand p{ margin:2px 0 0; font-size:13px; color:var(--ink-soft); }

  .status-pill{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    padding:6px 12px;
    border-radius:20px;
    background: var(--paper);
    border:1px solid var(--beige-deep);
    color: var(--blue-deep);
  }

  .sound-btn{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:6px 12px;
    border-radius:20px;
    background: var(--paper);
    border:1px solid var(--beige-deep);
    color: var(--ink);
    cursor:pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }
  .sound-btn:hover{ transform: translateY(-1px); }
  .sound-btn.on{
    background: var(--matcha);
    border-color: var(--matcha);
    color: var(--paper);
  }

  .stats-panel{ margin-top: 22px; }
  .shop-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 12px;
    background: var(--beige);
    border-radius: 14px;
    padding: 12px 14px;
  }
  .shop-name{ font-weight:700; font-size: 13.5px; }
  .shop-desc{ font-size: 12px; color: var(--ink-soft); margin-top:2px; }
  .stats-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 760px){
    .stats-grid{ grid-template-columns: repeat(2, 1fr); }
  }
  .stat{
    background: var(--beige);
    border-radius: 14px;
    padding: 14px 8px;
    text-align:center;
  }
  .stat-num{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 20px;
    color: var(--blue-deep);
    line-height:1.2;
  }
  .stat-label{
    font-size: 11px;
    color: var(--ink-soft);
    margin-top:2px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }

  /* ---------- Special banner ---------- */
  .specials-panel{ margin-bottom: 22px; }
  .specials-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 12px;
  }
  .special-single{ margin-bottom: 12px; }
  .special-buyout{ margin-top: 8px; text-align:center; }
  .specials-tabs{
    display:flex;
    gap:6px;
    margin-bottom: 10px;
  }
  .specials-tab{
    flex:1;
    font-family:'Quicksand', sans-serif;
    font-size: 12px;
    font-weight:600;
    padding: 6px 0;
    border-radius: 10px;
    border: 1.5px solid var(--beige-deep);
    background: var(--beige);
    color: var(--ink-soft);
    cursor:pointer;
  }
  .specials-tab.active{
    background: var(--blue-deep);
    border-color: var(--blue-deep);
    color: var(--paper);
  }
  .specials-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-top: 10px;
  }
  .specials-nav .btn{ padding: 6px 16px; font-size:12.5px; }
  .specials-count{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .special-row{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--beige);
    border-radius: 12px;
    padding: 9px 12px;
    font-size: 13px;
  }
  .special-row.done{
    background: var(--matcha);
    color: var(--paper);
  }
  .special-check{
    width: 18px;
    text-align:center;
    font-weight:700;
  }
  .special-icon{ font-size:16px; }
  .special-label{ flex:1; }
  .specials-reward-note{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    background: var(--cream);
    border-radius: 10px;
    padding: 8px 12px;
  }

  /* ---------- Layout grid ---------- */
  .grid{
    display:grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 22px;
  }
  @media (max-width: 760px){
    .grid{ grid-template-columns: 1fr; }
  }

  .panel{
    background: var(--paper);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 16px var(--shadow);
    border: 1px solid #ffffffaa;
  }

  .panel h2{
    font-size:16px;
    margin-bottom:12px;
    color: var(--blue-deep);
  }

  /* ---------- Cafe window scene ---------- */
  .scene{
    position:relative;
    border-radius:16px;
    overflow:hidden;
    height:180px;
    margin-bottom:18px;
    transition: background 1.2s ease;
  }
  .scene.morning{ background: linear-gradient(180deg, #FDE9C8, #F3C98E); }
  .scene.afternoon{ background: linear-gradient(180deg, #BFE0EC, #9AC4D6); }
  .scene.evening{ background: linear-gradient(180deg, #E7B9A6, #C98F82); }
  .scene.night{ background: linear-gradient(180deg, #2B3A4A, #1B2733); }

  .scene .frame{
    position:absolute; inset:10px;
    border: 6px solid var(--paper);
    border-radius:10px;
    background: rgba(255,255,255,0.08);
  }
  .scene .rain span{
    position:absolute;
    width:1.5px; height:16px;
    background: rgba(255,255,255,0.5);
    top:-20px;
    animation: fall linear infinite;
  }
  @keyframes fall{ to{ transform: translateY(220px); } }

  .scene .caption{
    position:absolute; bottom:8px; left:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--paper);
    background: rgba(0,0,0,0.25);
    padding:3px 9px;
    border-radius: 20px;
  }

  /* ---------- Tables ---------- */
  .tables{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:18px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .table-btn{
    border:2px solid transparent;
    background: var(--beige);
    border-radius:14px;
    padding:12px 10px;
    text-align:left;
    cursor:pointer;
    font-family:'Quicksand', sans-serif;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .table-btn:hover{ transform: translateY(-2px); }
  .table-btn.active{
    border-color: var(--blue-deep);
    background: #fff;
  }
  .table-btn .icon{ font-size:20px; }
  .table-btn .name{ font-weight:700; font-size:13.5px; display:block; margin-top:4px; }
  .table-btn .sub{ font-size:11px; color:var(--ink-soft); }

  /* ---------- Shelf of rewards ---------- */
  .shelf{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .shelf-item{
    width:52px; height:52px;
    border-radius:12px;
    background: var(--beige);
    display:flex;align-items:center;justify-content:center;
    font-size:24px;
    border: 1px solid var(--beige-deep);
  }
  .shelf-empty{
    font-size:12.5px;
    color: var(--ink-soft);
    font-style:italic;
  }

  /* ---------- Menu ---------- */
  .menu-list{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-height: 210px;
    overflow-y: auto;
    padding-right: 2px;
  }
  .menu-item{
    display:flex;
    align-items:center;
    gap:14px;
    background: var(--beige);
    border-radius:14px;
    padding:12px 14px;
    cursor:pointer;
    border: 2px solid transparent;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .menu-item:hover{ transform: translateX(3px); background:#E4D2B6; }
  .menu-item.disabled{ opacity:0.45; cursor:not-allowed; }
  .menu-item.selected{
    border-color: var(--blue-deep);
    background: #fff;
  }

  .order-summary{
    background: var(--beige);
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  .order-summary-items{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:8px;
  }
  .order-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background: #fff;
    border: 1.5px solid var(--beige-deep);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12.5px;
  }
  .order-chip button{
    border:none;
    background:transparent;
    color: var(--ink-soft);
    cursor:pointer;
    font-size:12px;
    padding:0;
  }
  .order-chip button:hover{ color: var(--blush); }
  .order-placeholder{
    font-size: 12.5px;
    color: var(--ink-soft);
    font-style: italic;
  }
  .order-summary-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .order-total{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--blue-deep);
  }
  .btn-disabled{
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-disabled:hover{ transform: none; }
  .menu-item .emoji{ font-size:26px; }
  .menu-item .info{ flex:1; }
  .menu-item .info .name{ font-weight:700; font-size:14.5px; font-family:'Fraunces', serif; }
  .menu-item .info .desc{ font-size:12px; color: var(--ink-soft); }
  .unlock-coin-btn{
    display:block;
    margin-top: 6px;
    font-family:'Quicksand', sans-serif;
    font-size: 11.5px;
    font-weight:700;
    border: 1.5px solid var(--blue-deep);
    background: #fff;
    color: var(--blue-deep);
    border-radius: 14px;
    padding: 4px 10px;
    cursor: pointer;
  }
  .unlock-coin-btn.disabled-coin{
    border-color: var(--beige-deep);
    color: var(--ink-soft);
    cursor: default;
  }
  .menu-item .time{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--blue-deep);
    background: var(--paper);
    padding:4px 8px;
    border-radius:10px;
    white-space:nowrap;
  }

  /* ---------- Corkboard / tickets ---------- */
  .corkboard{
    background: #C9A876;
    border-radius:16px;
    padding:16px;
    min-height:120px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-content:flex-start;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
  }
  .cork-empty{
    color: #fff8ea;
    font-size:12.5px;
    font-style:italic;
    margin:auto;
  }
  .ticket{
    background: var(--paper);
    width: 120px;
    padding:9px 9px 11px;
    border-radius:2px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    line-height:1.5;
    box-shadow: 0 3px 6px rgba(0,0,0,0.25);
    position:relative;
    animation: pin-in 0.4s ease;
  }
  .ticket::before{
    content:'';
    position:absolute; top:-5px; left:50%; transform: translateX(-50%);
    width:10px; height:10px; border-radius:50%;
    background: var(--blush);
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .ticket .t-name{ font-weight:700; font-size:11px; border-bottom:1px dashed #d8cbb5; padding-bottom:4px; margin-bottom:4px; }
  @keyframes pin-in{ from{ opacity:0; transform: translateY(-8px) rotate(0deg); } }

  /* ---------- Overlay (brewing / timer) ---------- */
  .overlay{
    position:fixed; inset:0;
    background: rgba(69,59,51,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index: 50;
    padding: 20px;
  }
  .overlay-card{
    background: var(--paper);
    border-radius: 22px;
    padding: 34px 30px;
    max-width: 380px;
    width:100%;
    text-align:center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .cup{
    font-size: 54px;
    margin-bottom: 6px;
    display:inline-block;
    position:relative;
  }
  .steam{
    position:absolute; top:-18px; left:50%; transform:translateX(-50%);
    font-size:16px;
    opacity:0.7;
    animation: steam 2.2s ease-in-out infinite;
  }
  @keyframes steam{
    0%,100%{ transform: translateX(-50%) translateY(0); opacity:0.6; }
    50%{ transform: translateX(-50%) translateY(-10px); opacity:0.9; }
  }
  .timer-display{
    font-family:'Fraunces', serif;
    font-size: 44px;
    font-weight:600;
    color: var(--blue-deep);
    margin: 10px 0 4px;
  }
  .timer-label{ color: var(--ink-soft); font-size:13px; margin-bottom:20px; }

  .ring-wrap{ position:relative; width:150px; height:150px; margin: 0 auto 14px; }
  .ring-wrap svg{ transform: rotate(-90deg); }
  .ring-bg{ stroke: var(--beige); }
  .ring-fg{ stroke: var(--blush); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

  .btn{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:13.5px;
    border:none;
    border-radius: 30px;
    padding: 10px 22px;
    cursor:pointer;
    background: var(--blue-deep);
    color: var(--paper);
    transition: transform 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn.ghost{
    background: transparent;
    color: var(--ink-soft);
    border: 1.5px solid var(--beige-deep);
  }
  .btn-row{ display:flex; gap:10px; justify-content:center; margin-top:6px; }

  /* ---------- Reflection form ---------- */
  .reflect-card{ text-align:left; max-width:420px; }
  .reflect-card h3{ font-size:18px; margin-bottom:14px; color:var(--blue-deep); }
  .field{ margin-bottom:14px; }
  .field label{ font-size:12.5px; font-weight:700; display:block; margin-bottom:6px; color:var(--ink); }
  .field input[type=text], .field textarea{
    width:100%;
    border:1.5px solid var(--beige-deep);
    border-radius:10px;
    padding:8px 10px;
    font-family:'Quicksand', sans-serif;
    font-size:13px;
    background: #fff;
    resize:vertical;
  }
  .scale{ display:flex; gap:6px; }
  .scale button{
    flex:1;
    padding:8px 0;
    border-radius:10px;
    border:1.5px solid var(--beige-deep);
    background:#fff;
    cursor:pointer;
    font-size:16px;
  }
  .scale button.sel{ background: var(--blush); border-color: var(--blush); }

  .mood-row{ display:flex; gap:6px; }
  .mood-row button{
    flex:1;
    padding:8px 0;
    font-size:20px;
    border-radius:10px;
    border:1.5px solid var(--beige-deep);
    background:#fff;
    cursor:pointer;
  }
  .mood-row button.sel{ background: var(--matcha); border-color: var(--matcha); }

  /* ---------- Reward toast ---------- */
  .reward-pop{
    text-align:center;
  }
  .reward-pop .big-emoji{ font-size:56px; margin-bottom:10px; }

  .reset-link{
    font-family:'Quicksand', sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    background: transparent;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
  .reset-link:hover{ color: var(--blush); }

  .auth-wrap{
    min-height: 70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  .auth-card{
    background: var(--paper);
    border-radius: 22px;
    padding: 32px 28px;
    max-width: 380px;
    width:100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }
  .auth-tabs{
    display:flex;
    gap:6px;
    margin-bottom: 18px;
  }
  .auth-error{
    color: var(--blush);
    font-size: 12.5px;
    margin: -6px 0 12px;
  }
  .auth-note{
    font-size: 11px;
    color: var(--ink-soft);
    text-align:center;
    margin-top: 14px;
  }

  footer{
    text-align:center;
    margin-top: 26px;
    font-size: 11.5px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
(function(){

    { id:'cheesecake', emoji:'🍓', name:'Strawberry Cheesecake', minutes:55, breakMin:5, desc:'Rich, unhurried focus block', night:false, lockedBy:'berrytreat', unlockCost:20 },
    { id:'pancakes', emoji:'🥞', name:'Pancakes', minutes:40, desc:'Stacked session, layer by layer', night:false },
    SECRET_TREAT,
  ];

  const TABLES = [
    { id:'maths', icon:'📐', name:'Maths Corner', sub:'Numbers & logic' },
    { id:'science', icon:'🔬', name:'Science Lab', sub:'Experiments & theory' },
    { id:'reading', icon:'📖', name:'Reading Nook', sub:'Books & language' },

  // Not real encryption — just light obfuscation so passwords aren't stored as
  // plain readable text. This is a client-side-only file with no server, so
  // there's no real security here; it's meant for casual separate profiles on
  // one device, not protecting sensitive information.
  function simpleHash(str){
    let hash = 0;
    for(let i=0;i<str.length;i++){
      hash = ((hash<<5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return hash.toString(36);
  }

    state.shelf = saved.shelf || [];

    state.breakBoost = saved.breakBoost || 0;
    state.allTime = Object.assign(
      { totalSessions: 0, totalMinutes: 0, has5StarFocus: false, itemsOrdered: [] },
      saved.allTime || {}
    );

    if(saved.lastActiveDate === today){
      state.tickets = saved.todayTickets || [];
      state.streak = saved.streak || 0;
    } else {
      const diff = daysBetween(saved.lastActiveDate, today);
      const hadSessionLastActive = (saved.todayTickets || []).length > 0;

  function handleSignup(){

    users[name] = { passwordHash: simpleHash(authPassword) };

  // ambient sound nodes live outside state since they aren't serializable
  let audioCtx = null;
  let noiseNode = null;
  let noiseGain = null;

  function makeNoiseBuffer(ctx){
    const bufferSize = 2 * ctx.sampleRate;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = buffer.getChannelData(0);
    let lastOut = 0;
    for(let i=0;i<bufferSize;i++){
      const white = Math.random()*2 - 1;
      lastOut = (lastOut + (0.02 * white)) / 1.02;
      output[i] = lastOut * 3.5;
    }
    return buffer;
  }

  function toggleSound(){

      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if(audioCtx.state === 'suspended') audioCtx.resume();
      noiseNode = audioCtx.createBufferSource();
      noiseNode.buffer = makeNoiseBuffer(audioCtx);
      noiseNode.loop = true;
      noiseGain = audioCtx.createGain();
      noiseGain.gain.value = 0.06;
      noiseNode.connect(noiseGain).connect(audioCtx.destination);
      noiseNode.start();
      state.soundOn = true;
    } else {
      if(noiseNode){ try{ noiseNode.stop(); }catch(e){} noiseNode.disconnect(); }
      state.soundOn = false;
    }
    render();
  }

            ? `<span class="order-total">Active</span>`

  function renderOverlay(){
    if(state.phase === 'brewing'){
      const item = state.pendingSession.item;
      return `
        <div class="overlay">
          <div class="overlay-card">
            <div class="cup">${item.emoji}<span class="steam">〰️</span></div>
            <div class="timer-label">Brewing your ${item.name}…</div>
            <div class="btn-row"><button class="btn ghost" id="cancelBrew">Cancel</button></div>
          </div>
        </div>`;
    }
    if(state.phase === 'running'){
      const item = state.pendingSession.item;
      const pct = state.totalSeconds ? (state.secondsLeft/state.totalSeconds) : 0;
      const r = 64, circ = 2*Math.PI*r;
      const offset = circ * pct;
      return `
        <div class="overlay">
          <div class="overlay-card">
            <div class="ring-wrap">
              <svg width="150" height="150">
                <circle cx="75" cy="75" r="${r}" fill="none" stroke-width="10" class="ring-bg"></circle>
                <circle cx="75" cy="75" r="${r}" fill="none" stroke-width="10" class="ring-fg"
                  stroke-dasharray="${circ}" stroke-dashoffset="${offset}"></circle>
              </svg>
              <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:34px;">${item.emoji}</div>
            </div>
            <div class="timer-display">${fmt(state.secondsLeft)}</div>
            <div class="timer-label">${item.name} · ${state.selectedTable ? TABLES.find(t=>t.id===state.selectedTable).name : 'No table chosen'}</div>
            <div class="btn-row"><button class="btn ghost" id="cancelRun">End early</button></div>
          </div>
        </div>`;
    }
    if(state.phase === 'reflect'){
      const item = state.pendingSession.item;
      return `
        <div class="overlay">
          <div class="overlay-card reflect-card">
            <h3>How was your ${item.name}?</h3>
            <div class="field">
              <label>What did you study?</label>
              <input type="text" id="r-studied" placeholder="e.g. algebra, chapter 4..." value="${state.reflect.studied}">
            </div>
            <div class="field">
              <label>How focused did it feel?</label>
              <div class="scale" id="r-focus">
                ${[1,2,3,4,5].map(n=>`<button data-n="${n}" class="${state.reflect.focus===n?'sel':''}">${n}</button>`).join('')}
              </div>
            </div>
            <div class="field">
              <label>Mood before → after</label>
              <div class="mood-row" id="r-mood">
                ${['😩','😕','😐','🙂','😊'].map((e,i)=>`<button data-m="${i}" class="before ${state.reflect.moodBefore===i?'sel':''}">${e}</button>`).join('')}
              </div>
              <div class="mood-row" id="r-mood-after" style="margin-top:6px;">
                ${['😩','😕','😐','🙂','😊'].map((e,i)=>`<button data-m="${i}" class="after ${state.reflect.moodAfter===i?'sel':''}">${e}</button>`).join('')}
              </div>
            </div>
            <div class="field">
              <label>Notes (optional)</label>
              <textarea id="r-notes" rows="2" placeholder="anything worth remembering...">${state.reflect.notes}</textarea>
            </div>
            <div class="btn-row"><button class="btn" id="r-submit">Close the tab</button></div>
          </div>
        </div>`;
    }
    if(state.phase === 'reward'){
      const rw = state.lastReward;
      const coinsWon = state.lastCoins;
      return `
        <div class="overlay">
          <div class="overlay-card reward-pop">
            ${state.tooShort ? `
              <div class="big-emoji">⏳</div>
              <h3>Too short to count</h3>
              <p style="color:var(--ink-soft); font-size:13px;">That session ended before a minute was up, so it wasn't logged. Give it a real go next time!</p>
            ` : rw ? `
              <div class="big-emoji">${rw.emoji}</div>
              <h3>You earned: ${rw.name}</h3>
              <p style="color:var(--ink-soft); font-size:13px;">It's been added to your shelf.</p>
            ` : coinsWon ? `
              <div class="big-emoji">🫘</div>
              <h3>+${coinsWon} coffee bean${coinsWon===1?'':'s'}</h3>
              <p style="color:var(--ink-soft); font-size:13px;">Your shelf's full, so it went straight into your coin jar (${state.coins} total).</p>
            ` : state.endedEarly ? `
              <div class="big-emoji">☕</div>
              <h3>Logged — ended early</h3>
              <p style="color:var(--ink-soft); font-size:13px;">Your minutes still counted, but sessions need to run full-length to earn a reward.</p>
            ` : `
              <div class="big-emoji">☕</div>
              <h3>Session complete</h3>
              <p style="color:var(--ink-soft); font-size:13px;">Thank you for studying.</p>
            `}
            <div class="btn-row"><button class="btn" id="r-done">Back to the cafe</button></div>
          </div>
        </div>`;
    }
    return '';
  }

  function attachEvents(){
    const soundToggle = document.getElementById('soundToggle');
    if(soundToggle) soundToggle.addEventListener('click', toggleSound);

    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) logoutBtn.addEventListener('click', logout);

    const resetBtn = document.getElementById('resetProgress');
    if(resetBtn) resetBtn.addEventListener('click', resetProgress);

    const buyBreakBoost = document.getElementById('buyBreakBoost');
    if(buyBreakBoost) buyBreakBoost.addEventListener('click', ()=>{
      if(state.coins < BREAK_BOOST_COST || state.breakBoost > 0) return;
      state.coins -= BREAK_BOOST_COST;
      state.breakBoost += BREAK_BOOST_MINUTES;
      saveData();
      render();
    });

    const toggleSpecials = document.getElementById('toggleSpecials');
    if(toggleSpecials) toggleSpecials.addEventListener('click', ()=>{
      state.specialsVisible = !state.specialsVisible;
      render();
    });

    document.querySelectorAll('.specials-tab').forEach(tab=>{
      tab.addEventListener('click', ()=>{
        state.specialsCategory = tab.dataset.cat;
        state.specialsIndex = 0;
        render();
      });
    });

    const buySpecialBtn = document.getElementById('buySpecial');
    if(buySpecialBtn) buySpecialBtn.addEventListener('click', ()=>{
      const id = buySpecialBtn.dataset.special;
      if(state.coins < SPECIAL_BUYOUT_COST) return;
      state.coins -= SPECIAL_BUYOUT_COST;
      if(!state.boughtSpecials.includes(id)) state.boughtSpecials.push(id);
      saveData();
      render();
    });

    document.querySelectorAll('.unlock-coin-btn').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const cost = parseInt(btn.dataset.cost, 10);
        const id = btn.dataset.unlock;
        if(state.coins < cost) return;
        state.coins -= cost;
        if(!state.earlyUnlocks.includes(id)) state.earlyUnlocks.push(id);
        saveData();
        render();
      });
    });

    const specialsPrev = document.getElementById('specialsPrev');
    if(specialsPrev) specialsPrev.addEventListener('click', ()=>{
      const len = SPECIALS_CATEGORIES[state.specialsCategory].length;
      state.specialsIndex = ((state.specialsIndex - 1) % len + len) % len;
      render();
    });

    const specialsNext = document.getElementById('specialsNext');
    if(specialsNext) specialsNext.addEventListener('click', ()=>{
      const len = SPECIALS_CATEGORIES[state.specialsCategory].length;
      state.specialsIndex = (state.specialsIndex + 1) % len;
      render();
    });

    document.querySelectorAll('.table-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        state.selectedTable = btn.dataset.table;
        render();
      });
    });

    document.querySelectorAll('.menu-item').forEach(el=>{
      if(el.classList.contains('disabled')) return;
      el.addEventListener('click', (e)=>{
        const kind = el.dataset.kind;
        const id = el.dataset.item;
        if(kind === 'treat'){
          state.selectedTreat = (state.selectedTreat === id) ? null : id;
        } else {
          state.selectedDrink = (state.selectedDrink === id) ? null : id;
        }
        render();
      });
    });

    document.querySelectorAll('[data-clear]').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        if(btn.dataset.clear === 'drink') state.selectedDrink = null;
        else state.selectedTreat = null;
        render();
      });
    });

    const startCombo = document.getElementById('startComboOrder');
    if(startCombo) startCombo.addEventListener('click', startComboOrder);

    const cancelBrew = document.getElementById('cancelBrew');
    if(cancelBrew) cancelBrew.addEventListener('click', ()=>{ state.phase='idle'; state.pendingSession=null; render(); });

    const cancelRun = document.getElementById('cancelRun');
    if(cancelRun) cancelRun.addEventListener('click', ()=>{
      clearInterval(state.timerHandle);
      state.endedEarly = true;
      state.phase = 'reflect';
      render();
    });

    const focusScale = document.getElementById('r-focus');
    if(focusScale) focusScale.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{ state.reflect.focus = parseInt(b.dataset.n); render(); });
    });

    const moodBefore = document.getElementById('r-mood');
    if(moodBefore) moodBefore.querySelectorAll('button.before').forEach(b=>{
      b.addEventListener('click', ()=>{ state.reflect.moodBefore = parseInt(b.dataset.m); render(); });
    });
    const moodAfter = document.getElementById('r-mood-after');
    if(moodAfter) moodAfter.querySelectorAll('button.after').forEach(b=>{
      b.addEventListener('click', ()=>{ state.reflect.moodAfter = parseInt(b.dataset.m); render(); });
    });

    const studiedInput = document.getElementById('r-studied');
    if(studiedInput) studiedInput.addEventListener('input', (e)=>{ state.reflect.studied = e.target.value; });
    const notesInput = document.getElementById('r-notes');
    if(notesInput) notesInput.addEventListener('input', (e)=>{ state.reflect.notes = e.target.value; });

    const submit = document.getElementById('r-submit');
    if(submit) submit.addEventListener('click', finishReflection);

    const rDone = document.getElementById('r-done');
    if(rDone) rDone.addEventListener('click', ()=>{
      state.phase = 'idle';
      state.pendingSession = null;
      state.lastReward = null;
      state.lastCoins = 0;
      state.endedEarly = false;
      state.tooShort = false;
      state.reflect = { studied:'', focus:0, moodBefore:null, moodAfter:null, notes:'' };
      render();
    });
  }

  function startComboOrder(){
    const drink = state.selectedDrink ? MENU.find(m=>m.id===state.selectedDrink) : null;
    const treat = state.selectedTreat ? MENU.find(m=>m.id===state.selectedTreat) : null;
    if(!drink && !treat) return;

    const parts = [drink, treat].filter(Boolean);
    const comboItem = {
      id: 'combo-' + parts.map(p=>p.id).join('-'),
      emoji: parts.map(p=>p.emoji).join(''),
      name: parts.map(p=>p.name).join(' + '),
      minutes: parts.reduce((s,p)=>s+p.minutes, 0),
      breakMin: parts.reduce((s,p)=>s+(p.breakMin||0), 0),
      night: parts.some(p=>p.night),
    };

    state.selectedDrink = null;
    state.selectedTreat = null;
    startOrder(comboItem);
  }

  function startOrder(item){
    state.endedEarly = false;
    let finalItem = item;
    if(state.breakBoost > 0){
      finalItem = Object.assign({}, item, {
        minutes: item.minutes + state.breakBoost,
        breakMin: (item.breakMin || 0) + state.breakBoost,
      });
      state.breakBoost = 0;
      saveData();
    }

    state.pendingSession = { item: finalItem, table: state.selectedTable };
    state.phase = 'brewing';
    render();
    setTimeout(()=>{
      if(state.phase !== 'brewing') return; // was cancelled
      state.totalSeconds = finalItem.minutes * 60;
      state.secondsLeft = state.totalSeconds;
      state.phase = 'running';
      render();
      state.timerHandle = setInterval(()=>{
        state.secondsLeft -= 1;
        if(state.secondsLeft <= 0){
          clearInterval(state.timerHandle);
          state.phase = 'reflect';
        }
        render();
      }, 1000);
    }, 1400);
  }

  function finishReflection(){
    const item = state.pendingSession.item;
    const tableName = state.pendingSession.table ? TABLES.find(t=>t.id===state.pendingSession.table).name : 'No table';
    const focusRating = state.reflect.focus || 3;
    const now = new Date();

    const elapsedSeconds = Math.max(0, state.totalSeconds - state.secondsLeft);
    const elapsedMinutes = Math.round(elapsedSeconds / 60);
    const completedFully = !state.endedEarly;
    const effectiveMinutes = completedFully ? item.minutes : elapsedMinutes;

    // too short to count as a real session — discard quietly, no ticket, no stats, no reward
    if(!completedFully && effectiveMinutes < 1){
      state.lastReward = null;
      state.lastCoins = 0;
      state.tooShort = true;
      state.phase = 'reward';
      render();
      return;
    }
    state.tooShort = false;

    // pin a ticket
    state.tickets.push({
      emoji: item.emoji,
      name: item.name,
      table: tableName,
      minutes: effectiveMinutes,
      focus: focusRating,
      night: !!item.night,
      notes: state.reflect.notes || '',
      hour: now.getHours(),
      tod: timeOfDayClass(),
      incomplete: !completedFully,
      rot: (Math.random()*10 - 5).toFixed(1),
    });

    // update all-time totals — real time studied always counts, even if ended early
    state.allTime.totalSessions += 1;
    state.allTime.totalMinutes += effectiveMinutes;
    if(completedFully && focusRating === 5) state.allTime.has5StarFocus = true;
    if(!state.allTime.itemsOrdered) state.allTime.itemsOrdered = [];
    if(completedFully && !state.allTime.itemsOrdered.includes(item.name)) state.allTime.itemsOrdered.push(item.name);

    if(!completedFully){
      // ended early: no shelf reward, no coins — closes the "start then cancel" exploit
      state.lastReward = null;
      state.lastCoins = 0;
    } else {
      // grant a shelf reward if any remain unclaimed, otherwise pay out coffee bean coins
      const unclaimed = REWARD_POOL.filter(r => !state.shelf.find(s => s.name === r.name));
      if(unclaimed.length){
        const reward = unclaimed[Math.floor(Math.random()*unclaimed.length)];
        state.shelf.push(reward);
        state.lastReward = reward;
        state.lastCoins = 0;
      } else {
        const earnedCoins = Math.max(3, Math.round(item.minutes / 5));
        state.coins += earnedCoins;
        state.lastReward = null;
        state.lastCoins = earnedCoins;
      }
    }

    saveData();
    state.phase = 'reward';
    render();
  }

  // ---------- Bootstrap ----------
  (function bootstrapSession(){
    try{
      const savedUser = localStorage.getItem(CURRENT_USER_KEY);
      if(savedUser){
        const users = loadUsers();
        if(users[savedUser]){
          currentUser = savedUser;
          loadData();
        }
      }
    }catch(e){ console.error('Cafe Focus: could not restore session', e); }
  })();

  render();
  // keep the window scene gently alive even if left open
  setInterval(()=>{ if(currentUser && state.phase==='idle') render(); }, 60000);
})();
</script>
</body>
</html>
